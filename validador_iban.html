<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de IBAN - Layer4 Solutions v2.5</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/validador_iban.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="main-content">
        <div class="card">
            <h1 style="color: var(--primary); margin-top: 0;">Validador de IBAN SEPA</h1>
            <p style="color: var(--secondary); margin-bottom: 2rem;">Validación internacional de cuentas.</p>

            <div class="input-group">
                <input type="text" id="ibanInput" placeholder="ES00 0000 0000 0000 0000 0000" maxlength="34" oninput="validar()">
            </div>

            <div id="box-result" class="res-box" style="display: none;">
                <div id="res-status" style="font-weight: 800; margin-bottom: 15px; font-size: 1.1rem;"></div>

                <div id="notificar-container" style="display: none; margin-top: 20px; padding: 15px; border: 2px dashed #64748b; border-radius: 12px; text-align: center; background-color: #f8fafc;">
                    <p style="margin: 0 0 10px 0; color: var(--secondary); font-weight: 800; font-size: 0.9rem;">¿No aparece información?</p>
                    <button onclick="notificarProgramacion()" style="background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s;">
                        Notifica a programación
                    </button>
                </div>
                
                <div class="info-row">
                    <span class="info-label">IBAN:</span>
                    <span class="info-value">
                        <span id="res-iban"></span> 
                        <button class="btn-copy-inline" onclick="copyText('res-iban')" style="background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s;">Copiar</button>
                    </span>
                </div>

                <div class="info-row">
                    <span class="info-label">BIC:</span>
                    <span class="info-value">
                        <span id="res-bic"></span>
                        <button class="btn-copy-inline" onclick="copyText('res-bic')" style="background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s;">Copiar</button>
                    </span>
                </div>

                <div class="bank-details">
                    <div id="res-banco-nombre" style="font-weight: 800; color: var(--primary);"></div>
                    <div id="res-banco-dir"></div>
                    <div id="res-banco-postal"></div>
                    <div id="res-oficina" style="margin-top: 8px; font-size: 0.85rem; font-weight: bold;"></div>
                </div>

                <div class="sepa-list" id="sepa-capabilities"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="scripts/main.js" defer></script>
    <script src="scripts/iban.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>At. Cliente - Layer4 Solutions v2.5</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="style/style.css"> <link rel="stylesheet" href="style/atencion_cliente.css"> </head>
<body>

    <div id="nav-placeholder"></div>

    <main class="main-content">
        <div class="card">
            <h1 style="color: var(--primary); margin-top: 0;">Gestor de Comunicaciones</h1>
            <p style="color: var(--secondary); margin-bottom: 2rem;">Generador de plantillas multilingües para WhatsApp y Email.</p>

            <div class="config-row">
                <div>
                    <label style="font-size: 11px; font-weight: 800; color: var(--secondary);">PLANTILLA</label>
                    <select id="tplSelect" onchange="renderForm()" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                        <option value="bienvenida">Mensaje de Bienvenida</option>
                        <option value="apn">Configuración de Internet (APN)</option>
                        <option value="incidencianueva">Nueva Incidencia</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 11px; font-weight: 800; color: var(--secondary);">IDIOMA</label>
                    <select id="langSelect" onchange="updatePreview()" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                        <option value="es">Castellano</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="it">Italiano</option>
                        <option value="pt">Português</option>
                        <option value="ca">Català</option>
                    </select>
                </div>
            </div>

            <div id="dynamic-vars" class="vars-grid"></div>

            <div class="preview-box">
                <div class="preview-header">
                    <span class="label-mini">ASUNTO</span>
                    <button class="btn-copy-tiny" onclick="copyField('preview-subject')">COPIAR ASUNTO</button>
                </div>
                <div id="preview-subject" class="subject-box" title="Clic para copiar"></div>

                <div class="preview-header">
                    <span class="label-mini">CUERPO DEL MENSAJE</span>
                    <button class="btn-copy-tiny" onclick="copyField('preview-body')">COPIAR CUERPO</button>
                </div>
                <div id="preview-body" class="body-box" title="Clic para copiar"></div>

                <div class="actions-grid">
                    <button class="btn-large btn-wa" onclick="sendWA()">WHATSAPP</button>
                    <button class="btn-large btn-mail" onclick="sendMail()">MAIL (SISTEMA)</button>
        <!--            <button class="btn-large btn-o365" onclick="sendOutlookApp()">OUTLOOK APP</button> -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div id="update-toast">
        <span>🚀 Nueva versión v2.5 disponible</span>
        <button onclick="actualizarApp()">Actualizar</button>
    </div>

    <script src="scripts/main.js" defer></script> <script src="scripts/atencion_cliente.js" defer></script> </body>
</html>
